<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- 拱门 = 架构的秩序 -->
  <g transform="translate(200,155)">
    <path d="M-65,65 L-65,-15 A65,65 0 0,1 65,-15 L65,65" 
          fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <!-- AI 横杠 = AI 在秩序中执行 -->
    <line x1="-32" y1="-15" x2="32" y2="-15" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 品牌名 -->
  <text x="200" y="310" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="26" letter-spacing="8">ArchAIHarness</text>
  <!-- 核心理念 -->
  <text x="200" y="340" text-anchor="middle" fill="#999" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="400" font-size="9" letter-spacing="4">重塑 AI 时代下的软件开发新秩序</text>
</svg>